seed: 1337
model:
  vocab_size: 50304
  d_model: 1024
  n_layers: 16
  n_heads: 16
  n_kv_heads: 8
  ffn_mult: 4
  max_seq_len: 2048
  rope_theta: 10000.0
train:
  global_batch_size: 24
  micro_batch_size: 2
  grad_accum_steps: 4
  lr: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  max_steps: 1000
  bf16: true
  activation_checkpointing: true
distributed:
  mode: dp
  tensor_parallel: 1
  pipeline_parallel: 1
  sequence_parallel: false
  expert_parallel: 1
logging:
  log_every: 10
  ckpt_every: 200
